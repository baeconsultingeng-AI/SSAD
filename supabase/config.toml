[api]
project_id = "your-project-ref"     # Replace with your Supabase project ref

[db]
port = 5432

[studio]
port = 54323
enabled = true

[inbucket]
port = 54324

[storage]
enabled = true

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = []
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
enable_confirmations = false
